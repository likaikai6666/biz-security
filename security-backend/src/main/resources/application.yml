spring:
  # Redis配置
  redis:
    host: localhost  # Redis服务器地址（默认本地）
    port: 6379       # Redis端口（默认6379）
    password:        # Redis密码（若未设置则为空）
    database: 0      # 数据库索引（默认0）

    # 连接池配置（Lettuce）
    lettuce:
      pool:
        max-active: 8   # 最大连接数
        max-idle: 8     # 最大空闲连接
        min-idle: 2     # 最小空闲连接
        max-wait: 100ms # 连接获取超时时间
    # 超时配置
    timeout: 2000ms  # 连接超时时间（毫秒）  # 把这个注释移到这里更合适

logging:
  level:
    # OAuth2 认证核心日志（Token 解析、客户端验证等）
    org.springframework.security.oauth2: DEBUG
    # JWT 解析日志（查看 Token 是否被正确解析）
    org.springframework.security.oauth2.server.resource: DEBUG
    # 认证过滤器链日志（查看请求经过哪些过滤器）
    org.springframework.security.web: DEBUG
    # 权限校验日志（查看接口权限判断过程）
    org.springframework.security.access: DEBUG  # 注释前加空格，或移到上一行